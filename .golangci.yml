version: "2"

run:
  timeout: 3m
  modules-download-mode: readonly

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - nilerr
    - bodyclose
    - godot
    - prealloc
    - revive
  settings:
    errcheck:
      check-type-assertions: true
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: var-naming
          disabled: true
