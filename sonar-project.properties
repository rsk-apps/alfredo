sonar.projectKey=rafaelsoares_alfredo
sonar.organization=rafaelsoares

sonar.projectName=alfredo
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=.
sonar.exclusions=**/*_test.go,**/vendor/**,**/testdata/**

sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Go coverage report (generated by CI before Sonar scan)
sonar.go.coverage.reportPaths=coverage.out

# Exclude pure-type domain packages and config from coverage metrics
sonar.coverage.exclusions=\
  **/domain/**,\
  **/config/**,\
  **/shared/**,\
  **/cmd/**

# Language
sonar.language=go
