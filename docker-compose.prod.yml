services:
  alfredo:
    image: ghcr.io/rafaelsp93/alfredo:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: alfredo
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - alfredo-data:/app/data
    environment:
      - APP_SERVER_HOST=0.0.0.0
      - APP_SERVER_PORT=8080
      - APP_DATABASE_PATH=/app/data/alfredo.db
      - APP_TIMEZONE=${APP_TIMEZONE:-America/Sao_Paulo}
      - APP_GCALENDAR_CLIENT_ID=${APP_GCALENDAR_CLIENT_ID:-}
      - APP_GCALENDAR_CLIENT_SECRET=${APP_GCALENDAR_CLIENT_SECRET:-}
      - APP_GCALENDAR_REFRESH_TOKEN=${APP_GCALENDAR_REFRESH_TOKEN:-}
      - APP_TELEGRAM_BOT_TOKEN=${APP_TELEGRAM_BOT_TOKEN:-}
      - APP_TELEGRAM_CHAT_ID=${APP_TELEGRAM_CHAT_ID:-}
      - APP_AGENT_ANTHROPIC_API_KEY=${APP_AGENT_ANTHROPIC_API_KEY:-}
      - APP_AGENT_MODEL=${APP_AGENT_MODEL:-claude-haiku-4-5-20251001}
      - APP_AGENT_MAX_ITERATIONS=${APP_AGENT_MAX_ITERATIONS:-5}
      - APP_AGENT_MAX_OUTPUT_TOKENS=${APP_AGENT_MAX_OUTPUT_TOKENS:-512}
      - APP_AGENT_TOTAL_TIMEOUT_SECONDS=${APP_AGENT_TOTAL_TIMEOUT_SECONDS:-20}
      - APP_AGENT_CALL_TIMEOUT_SECONDS=${APP_AGENT_CALL_TIMEOUT_SECONDS:-8}
      - APP_AUTH_API_KEY=${APP_AUTH_API_KEY}
      - APP_LOG_LEVEL=info
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alfredo.rule=Host(`rsk-apps.cloud`)"
      - "traefik.http.routers.alfredo.entrypoints=websecure"
      - "traefik.http.routers.alfredo.tls=true"
      - "traefik.http.routers.alfredo.tls.certresolver=letsencrypt"
      - "traefik.http.services.alfredo.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  alfredo-data:
    driver: local
