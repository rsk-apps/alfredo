name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  vuln:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Check vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          make vuln

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install coverage tool
        run: go install github.com/vladopajic/go-test-coverage/v2@latest

      - name: Run unit tests
        run: make test

      - name: Check coverage
        run: make check-coverage

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run integration tests
        run: make integration-test

      - name: Check route coverage
        run: make check-routes

  build:
    runs-on: ubuntu-latest
    needs: [lint, vuln, unit-test, integration-test]
    permissions:
      contents: read
      packages: write
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}:latest .

      - name: Push to GHCR
        run: docker push ghcr.io/${{ github.repository }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          docker-compose-path: docker-compose.prod.yml
          environment-variables: |
            IMAGE_TAG=latest
            APP_GCALENDAR_CLIENT_ID=${{ secrets.APP_GCALENDAR_CLIENT_ID }}
            APP_GCALENDAR_CLIENT_SECRET=${{ secrets.APP_GCALENDAR_CLIENT_SECRET }}
            APP_GCALENDAR_REFRESH_TOKEN=${{ secrets.APP_GCALENDAR_REFRESH_TOKEN }}
            APP_TELEGRAM_BOT_TOKEN=${{ secrets.APP_TELEGRAM_BOT_TOKEN }}
            APP_TELEGRAM_CHAT_ID=${{ secrets.APP_TELEGRAM_CHAT_ID }}
            APP_AGENT_ANTHROPIC_API_KEY=${{ secrets.APP_AGENT_ANTHROPIC_API_KEY }}
            APP_AGENT_MODEL=${{ vars.APP_AGENT_MODEL || 'claude-haiku-4-5-20251001' }}
            APP_AGENT_MAX_ITERATIONS=5
            APP_AGENT_MAX_OUTPUT_TOKENS=512
            APP_AGENT_TOTAL_TIMEOUT_SECONDS=20
            APP_AGENT_CALL_TIMEOUT_SECONDS=8
            APP_AUTH_API_KEY=${{ secrets.APP_AUTH_API_KEY }}
